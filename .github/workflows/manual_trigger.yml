name: manual trigger

on:
  workflow_dispatch:
    inputs:
      askName:
        required: true
        type: string
        default: "Stranger"
        description: "Hello There, What's your name !!"
    

jobs:
  manual_timecheck:
    runs-on: ubuntu-slim
    steps:
      - name: time_check
        run: date
      - name: greet
        run: echo "Hello ${{ inputs.askName }}"
